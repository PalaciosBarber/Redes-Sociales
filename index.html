<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Palacios Barber Shop: Dudas o Sugerencias por WhatsApp, síguenos en Facebook e Instagram y encuentra nuestra ubicacióna traves de Google Maps.">
  <meta name="author" content="Palacios Barber Shop">
  <meta name="keywords" content="barbería, Palacios, Monterrey, corte de cabello, barber shop, estilo">
  <title>Palacios Barber Shop</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet"/>
  <link rel="icon" href="images/barber-icon.png" type="image/png">
  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: url("images/fondo1.jpeg") center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }.card {
  animation: fadeIn 1s ease-in-out;
}

@keyframes fadeIn {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}   
.card {
  position: relative; /* <- ESTA LÍNEA ES CLAVE */
  width: 90%;
  max-width: clamp(230px, 80%, 350px); /* ← Automático */
  padding: 1.5rem 1rem;
  margin: 3rem auto;
  border-radius: 15px;
  box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
  text-align: center;
}

/* Elimina la altura fija o demasiado restrictiva */
@media (min-height: 500px) {
  .card {
    min-height: 400px;
  }
}

.card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: url("images/fondo2.png") center/cover no-repeat;
  opacity: 0.5;
  z-index: -1;
  border-radius: 20px;
}


    .buttons {
  display: flex;
  flex-direction: column;
  justify-content: space-between; /* Distribuye el espacio entre los botones */
  flex: 1;
  margin: 162px 25px 0; /* Margen superior e inferior */
}

.btn {
  height: 50px; /* Tamaño fijo */
  text-decoration: none;
  background: #1e1e1ebb;
  color: white;
  border-radius: 10px;
  transition: background 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 10px 0; /* Margen entre los botones */
}

    .btn:hover {
      background: #0b0904e0;
      color: #ffffff;
    }
  </style>
</head>
<body>
<div class="card">
  <div class="buttons">
    <a class="btn" href="https://www.instagram.com/palacios_barber.shop?igsh=eWY2OHNpNTNoczZn" target="_blank">
      <img src="images/Instagram_icon.png" alt="Ir al perfil de Instagram de Palacios Barber Shop" style="height: 24px; margin-right: 10px;">
      Instagram
    </a>
    <a class="btn" href="https://www.facebook.com/share/1BRDSiJkK7/" target="_blank">
      <img src="images/facebook_icon.png" alt="Ir al perfil de Facebook de Palacios Barber Shop" style="height: 24px; margin-right: 10px;">
      Facebook
    </a>
    <a class="btn" href="https://wa.me/message/XLTLY73TJEYQF1" target="_blank">
      <img src="images/whatsapp-icon.png" alt="Ir al WhatsApp de Palacios Barber Shop" style="height: 24px; margin-right: 10px;">
      WhatsApp
    </a>
    <a class="btn" href="https://maps.google.com/?q=Palacios+Barber+Shop" target="_blank">📍 Google Maps</a>
  </div>
</div>
</body>
</html>
